name: Build Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload Fabric artifact
        uses: actions/upload-artifact@v4
        with:
          name: splitscreen-fabric-${{ github.sha }}
          path: fabric/build/libs/*.jar
          if-no-files-found: error
          retention-days: 30

      - name: Upload NeoForge artifact
        uses: actions/upload-artifact@v4
        with:
          name: splitscreen-neoforge-${{ github.sha }}
          path: neoforge/build/libs/*.jar
          if-no-files-found: error
          retention-days: 30

      - name: Generate build summary
        run: |
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Fabric" >> $GITHUB_STEP_SUMMARY
          ls -lh fabric/build/libs/*.jar | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### NeoForge" >> $GITHUB_STEP_SUMMARY
          ls -lh neoforge/build/libs/*.jar | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
